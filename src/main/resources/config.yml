# RuinedWardrobe main configuration
# ------------------------------------------------------------
# Reload supported with: /wardrobe reload
# This file controls behavior, storage, integrations, anti-dupe, and performance.
# Most servers can run these defaults as-is. The comments explain what to raise or lower
# when you grow into hundreds or thousands of online players.
# Built for Paper/Folia 26.1.1 on Java 25.
# On config version changes, RuinedWardrobe backs up the old file and writes the new template automatically.
# Storage migrations also write a full snapshot backup before data is copied.
# Older local schema layouts are imported automatically on startup with a verified backup.
# All text is configured in lang/*.yml.

# Config schema version used by RuinedWardrobe for compatibility checks.
# If this value does not match the plugin's expected version, the plugin will back up this file,
# replace it with the latest bundled template, and continue loading with the new version.
config-version: 6

language:
  # Global language file name loaded from /plugins/RuinedWardrobe/lang/<active>.yml
  # Fallback keys are always pulled from lang/en_US.yml when missing.
  # Example values: en_US, es_ES, fr_FR
  active: en_US

messages:
  # Message parser mode:
  # LEGACY = parse only & color codes
  # MINIMESSAGE = parse only MiniMessage tags
  # BOTH = auto-detect and support both formats (recommended for mixed configs)
  format-mode: BOTH # LEGACY | MINIMESSAGE | BOTH

wardrobe:
  # Base number of unlocked slots for players with no rank slot permissions.
  # Final slot amount is computed from:
  # max( default-slots, highest ruinedwardrobe.slots.<n> permission ) + admin bonus slots
  default-slots: 3

  # Hard upper limit to protect UI, database size, and misuse.
  # Even with permissions/bonuses, players cannot exceed this cap.
  max-slots-cap: 54

  # Number of GUI pages exposed in the wardrobe menu.
  # Extra pages beyond a player's unlocked slot cap will render as locked slots.
  # Keep this >= 1.
  max-pages: 2

  # Cooldown after successful equip.
  # Players with ruinedwardrobe.bypass.cooldown ignore this.
  equip-cooldown-seconds: 3

death:
  # Controls what happens to equipped wardrobe armor when a player dies and keepInventory is false.
  # false = vanilla-style loss: wardrobe armor drops as normal items and is removed from the saved wardrobe slot.
  # true  = protected wardrobe: wardrobe armor does not drop, the saved wardrobe slot stays intact,
  #         and the equipped/selected state is cleared so the player can re-equip it after respawn.
  # Minecraft's keepInventory gamerule always wins; when keepInventory is true, equipped armor remains untouched.
  keep-wardrobe-on-death: false

storage:
  # Storage backend:
  # SQLITE = local single-file storage, easiest setup
  # MYSQL = shared DB for multi-server/network deployments
  # The explicit `/wardrobe migrate` command verifies copied row digests and writes a snapshot backup first.
  type: SQLITE # SQLITE | MYSQL

  sqlite:
    # Relative path from plugin data folder.
    # Example absolute output path:
    # /plugins/RuinedWardrobe/data/wardrobe.db
    # Keep this file on fast local storage and back it up before major server updates.
    file: data/wardrobe.db

  mysql:
    # MySQL/MariaDB connection details.
    # Recommended when multiple servers need to share the same wardrobe data.
    host: 127.0.0.1
    port: 3306
    database: ruinedwardrobe
    username: root
    password: change_me

    # JDBC query params appended to connection URL.
    # Add timezone, SSL, or performance params here as needed.
    params: useUnicode=true&characterEncoding=utf8&useSSL=false

  pool:
    # HikariCP pool sizing.
    # max-size: upper bound of open DB connections.
    # min-idle: idle connections kept ready.
    # connection-timeout-ms: how long to wait for a free connection before failing.
    max-size: 10
    min-idle: 2
    connection-timeout-ms: 10000

performance:
  cache:
    # In-memory profile cache.
    # max-size: maximum player profiles kept in memory.
    # expire-after-seconds: unload cached profiles after this many idle seconds.
    # Bigger cache = fewer database reads. Smaller cache = lower memory use.
    max-size: 100000
    expire-after-seconds: 600

  session:
    # Join behavior.
    # preload-profile-on-join:
    #   false = fastest joins; profile loads only when a player uses wardrobe features.
    #   true  = warmer placeholders/menus right after login, but every join does a DB read.
    # touch-player-row-on-join:
    #   false = only create DB rows when a player actually saves/equips/admin-slots.
    #   true  = create/update a player row on every join; useful only if another tool expects all players in DB.
    preload-profile-on-join: false
    touch-player-row-on-join: false

  sync:
    # Cross-instance sync polling (mainly for MYSQL shared DB mode).
    # Used only when storage.type is MYSQL.
    # poll-seconds: how often this server checks whether another server changed an online player's wardrobe.
    # batch-size: how many online players are checked per DB query batch.
    # Huge networks: increase batch-size if sync falls behind; increase poll-seconds to reduce DB load.
    poll-seconds: 5
    batch-size: 150

  armor-sync:
    # Safety net that periodically saves durability/repair changes for currently equipped wardrobe armor.
    # Event hooks already save normal damage, mend, break, quit, and death changes.
    # enabled: keep true unless you want only event-driven sync.
    # scan-interval-ticks: how often the safety scan runs. 20 ticks = 1 second.
    # scan-batch-size: max online players inspected per scan. Lower this on massive servers to flatten spikes.
    # shutdown-flush-timeout-seconds: max time to wait while saving online wardrobe armor during shutdown/reload.
    enabled: true
    scan-interval-ticks: 40
    scan-batch-size: 500
    shutdown-flush-timeout-seconds: 10

  database:
    # Async DB write queue and retry policy.
    # write-queue-capacity: max queued DB jobs before new work is rejected instead of freezing the server.
    # write-retries: retry count for failed writes.
    # retry-delay-ms: wait between retries.
    # worker-threads: async DB workers. The plugin caps this to the connection pool size.
    # Huge servers: scale max-size and worker-threads together; don't set workers far above DB capacity.
    write-queue-capacity: 2048
    write-retries: 3
    retry-delay-ms: 150
    worker-threads: 4

  health:
    # Lightweight health log for quick diagnostics.
    # Set enabled false if you prefer silent production logs.
    enabled: true

    # Interval for internal health log lines:
    # cache size/hit rate, DB queue depth/latency, sync poll timing, etc.
    log-seconds: 120

audit:
  # Writes a separate wardrobe activity log to help trace armor loss, dupes, sync issues, and storage errors.
  # This is intentionally not console spam. Logs go to:
  # /plugins/RuinedWardrobe/logs/wardrobe-audit-YYYY-MM-DD.log
  enabled: true

  # Folder inside the plugin data folder where audit files are written.
  # Keep this inside the plugin folder; paths that try to escape it are ignored for safety.
  directory: logs

  # Async log queue size. If disk stalls and this fills, new audit lines are dropped instead of freezing the server.
  # Huge servers with many wardrobe actions can raise this.
  queue-size: 4096

  # Successful background armor syncs are usually noisy.
  # false = log important player actions, death handling, sanitizer removals, and errors only.
  # true  = also log every successful changed armor sync.
  log-successful-syncs: false

  # Logs denied equips/edits/deletes such as cooldowns, locked slots, and restrictions.
  log-blocked-actions: true

  # Adds simple material summaries for saved/equipped sets.
  # Useful for debugging, but disable it if you want smaller logs.
  include-item-summaries: true

restrictions:
  # Master restriction toggle for equip checks.
  # If false, world/gamemode/combat/placeholder restrictions are skipped.
  enabled: true

  # Worlds that can never use equip (case-insensitive world names).
  blocked-worlds: []

  # Optional allow-list. If non-empty, only listed worlds are allowed.
  # This check runs before blocked-worlds.
  allowed-worlds: []

  # Gamemodes where equip is blocked.
  blocked-gamemodes:
    - SPECTATOR

  combat-check:
    # Uses detected combat hook provider (e.g., CombatLogX adapter) when enabled.
    enabled: true

  placeholder-rules:
    # Rules evaluated only when PlaceholderAPI is present and enabled in integrations.
    # If placeholder output matches any disallow-values, equip is blocked with reason-key.
    # Add multiple entries under this section as needed.
    region_block_example:
      placeholder: "%worldguard_region_name%"
      disallow-values:
        - spawn
      reason-key: restriction.placeholder

integrations:
  placeholderapi:
    # Enables PlaceholderAPI usage for restrictions/messages/placeholders.
    enabled: true
  vault:
    # Enables Vault hook discovery (economy hook is optional and architecture-ready).
    enabled: true
  combat:
    # Enables combat hook discovery for restriction checks.
    enabled: true

gui:
  # Runtime feedback toggles (does not define GUI layout; see gui.yml for layout).
  sounds:
    enabled: true
  actionbar:
    enabled: true
  titles:
    enabled: true
  animations:
    enabled: true

    # Tick delay used by click animation/feedback scheduling.
    # 20 ticks = 1 second.
    click-delay-ticks: 2

anti-dupe:
  # Strict container lock:
  # true  = block interaction with non-player containers while wearing bound wardrobe armor
  # false = allow container interaction, while still enforcing bound-item move/drop protections
  strict-container-lock: false

metrics:
  # bStats toggle.
  # Set plugin-id from your bStats page when publishing.
  enabled: false
  plugin-id: 0

debug:
  # Enables additional debug logging for diagnostics and migration troubleshooting.
  enabled: false
