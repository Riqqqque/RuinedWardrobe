# RuinedWardrobe permission mapping reference
# ---------------------------------------------------------------------------
# IMPORTANT:
# - This file is a documented template/reference.
# - RuinedWardrobe does NOT automatically assign these groups to players.
# - Apply these nodes in your permission plugin (LuckPerms, PEX, etc.).
#
# Core permission conventions:
# - ruinedwardrobe.use: allows base /wardrobe access.
# - ruinedwardrobe.command.*: grants all non-admin command nodes.
# - ruinedwardrobe.command.doctor: runtime diagnostics command.
# - ruinedwardrobe.admin.*: grants all admin command nodes.
# - ruinedwardrobe.slots.<n>: grants slot tier (highest node wins).
# - ruinedwardrobe.bypass.*: bypasses specific protections/restrictions.
#
# Recommended rank strategy:
# - Keep one slot tier node per rank (3, 6, 9, 15, etc.).
# - Avoid assigning multiple slot tiers to one rank unless intentional.
# - Give admin bypass nodes only to trusted staff.
# - Keep default-player minimal to reduce abuse risk.
#
# Example adaptation:
# - Rename these group keys to match your network ranks.
# - Add or remove command nodes depending on monetization model.

# Baseline group for normal players.
# Includes only wardrobe user commands and the base 3-slot tier.
default-player:
  - ruinedwardrobe.use
  - ruinedwardrobe.command.help
  - ruinedwardrobe.command.list
  - ruinedwardrobe.slots.3

# Mid-tier rank example.
# Adds only slot expansion. Command access is inherited from default-player.
vip:
  - ruinedwardrobe.slots.6

# Higher rank slot expansion.
mvp:
  - ruinedwardrobe.slots.9

# Premium rank slot expansion.
legend:
  - ruinedwardrobe.slots.15

# Staff/administrator profile.
# Full command access plus bypass permissions for moderation/support cases.
admin:
  - ruinedwardrobe.admin.*
  - ruinedwardrobe.command.*
  - ruinedwardrobe.command.doctor
  - ruinedwardrobe.bypass.cooldown
  - ruinedwardrobe.bypass.restrictions
  - ruinedwardrobe.bypass.emptycheck
  - ruinedwardrobe.bypass.combat
