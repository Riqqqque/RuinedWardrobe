name: RuinedWardrobe
version: ${version}
main: dev.rique.ruinedwardrobe.RuinedWardrobePlugin
api-version: '26.1.1'
author: Rique
description: High-performance wardrobe plugin for Paper and Folia.
folia-supported: true
softdepend:
  - PlaceholderAPI
  - Vault
  - CombatLogX

commands:
  wardrobe:
    description: Main RuinedWardrobe command.
    aliases: [rw]
    usage: /wardrobe

permissions:
  ruinedwardrobe.use:
    default: true
  ruinedwardrobe.command.help:
    default: true
  ruinedwardrobe.command.list:
    default: true
  ruinedwardrobe.command.doctor:
    default: op
  ruinedwardrobe.command.reload:
    default: op
  ruinedwardrobe.command.migrate:
    default: op
  ruinedwardrobe.admin:
    default: op
  ruinedwardrobe.admin.*:
    default: op
    children:
      ruinedwardrobe.admin: true
      ruinedwardrobe.command.doctor: true
      ruinedwardrobe.command.reload: true
      ruinedwardrobe.command.migrate: true
  ruinedwardrobe.command.*:
    default: op
    children:
      ruinedwardrobe.command.help: true
      ruinedwardrobe.command.list: true
      ruinedwardrobe.command.doctor: true
      ruinedwardrobe.command.reload: true
      ruinedwardrobe.command.migrate: true
  ruinedwardrobe.bypass.cooldown:
    default: op
  ruinedwardrobe.bypass.restrictions:
    default: op
  ruinedwardrobe.bypass.emptycheck:
    default: op
  ruinedwardrobe.bypass.combat:
    default: op
  ruinedwardrobe.notify.update:
    default: op
  ruinedwardrobe.api.listen:
    default: false
